<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
    Full page/tab content.
    Script + popup stau în afara zonei AJAX.
-->
<div th:fragment="content">

    <div th:replace="~{league-rankings :: rankingsAjaxContent}"></div>

    <div id="matrixPredictionPopup"
         class="matrix-prediction-popup"
         hidden></div>

    <script src="/js/matrix-prediction-popup.js"></script>

</div>


<!--
    AJAX refresh content only.
    Endpoint:
        /leagues/{id}/rankings-fragment
-->
<div th:fragment="rankingsAjaxContent">

    <div id="leagueRankingsAjaxBox"
         data-ajax-refresh-url=""
         th:attr="data-ajax-refresh-url=@{/leagues/{id}/rankings-fragment(id=${league.id})}">

        <div class="rankings-mobile-layout">

            <!-- LEFT: Rankings -->
            <section class="card league-inline-card rankings-panel">

                <h4 class="rankings-panel-title">Rankings</h4>

                <div class="rankings-scroll">
                    <table class="simple-table rankings-compact-table">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Player</th>
                            <th>Total</th>
                            <th>4pt</th>
                            <th>3pt</th>
                            <th>1pt</th>
                            <th>Pts</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="r, it : ${rankings}">
                            <td th:text="${it.index + 1}">1</td>
                            <td th:text="${r.fullName}">Player</td>
                            <td class="rank-total"
                                th:text="${r.exact4 + r.exact3 + r.resultCount}">
                                0
                            </td>
                            <td class="rank-exact4" th:text="${r.exact4}">0</td>
                            <td class="rank-exact3" th:text="${r.exact3}">0</td>
                            <td class="rank-result" th:text="${r.resultCount}">0</td>
                            <td>
                                <strong th:text="${r.points}">0</strong>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(rankings)}">
                            <td colspan="7">No ranking data yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Winner predictions -->
                <section class="winner-picks-box">

                    <h4 class="winner-picks-title">
                        Winner predictions
                    </h4>

                    <div class="winner-picks-empty"
                         th:if="${winnerPickRows == null || winnerPickRows.isEmpty()}">
                        No winner predictions yet.
                    </div>

                    <div class="winner-picks-list"
                         th:if="${winnerPickRows != null && !winnerPickRows.isEmpty()}">

                        <div class="winner-pick-row"
                             th:each="w : ${winnerPickRows}">

                            <span class="winner-pick-player"
                                  th:text="${w.fullName}">
                                Player
                            </span>

                            <span class="winner-pick-team"
                                  th:text="${w.teamName}">
                                Brazil
                            </span>

                        </div>

                    </div>

                </section>

            </section>

            <!-- RIGHT: Prediction analytics -->
            <section class="card league-inline-card matrix-panel">

                <h4 class="rankings-panel-title">Prediction analytics</h4>

                <div class="matrix-scroll">
                    <table class="league-table prediction-matrix-table">
                        <thead>
                        <tr>
                            <th class="mx-sticky mx-col-no">No</th>
                            <th class="mx-sticky mx-col-stage">Stage</th>
                            <th class="mx-sticky mx-col-match">Match</th>
                            <th class="mx-sticky mx-col-kickoff">Kickoff</th>
                            <th class="mx-sticky mx-col-official">Official</th>

                            <th th:each="player : ${predictionMatrixPlayers}"
                                class="mx-player-head"
                                th:text="${player}">
                                Player
                            </th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:if="${predictionMatrix == null || predictionMatrix.isEmpty()}">
                            <td colspan="20">No prediction data yet.</td>
                        </tr>

                        <tr th:each="row : ${predictionMatrix}"
                            class="matrix-match-row"
                            th:attr="data-match-title=${row.teamA + ' - ' + row.teamB},
                                     data-match-no=${row.matchNo},
                                     data-official=${row.officialScoreA != null and row.officialScoreB != null ? row.officialScore : 'Not started'}">

                            <td class="mx-sticky mx-col-no"
                                th:text="${row.matchNo}">
                                1
                            </td>

                            <td class="mx-sticky mx-col-stage"
                                th:text="${row.stageShort}">
                                Gr.A
                            </td>

                            <td class="mx-sticky mx-col-match">
                                <div class="mx-match-mobile">
                                    <span th:text="${row.teamA}">Team A</span>
                                    <span class="mx-match-sep">-</span>
                                    <span th:text="${row.teamB}">Team B</span>
                                </div>
                            </td>

                            <td class="mx-sticky mx-col-kickoff"
                                th:text="${row.kickoffAt == null ? '-' : #temporals.format(row.kickoffAt, 'dd.MM HH:mm')}">
                                14.06 21:00
                            </td>

                            <td class="mx-sticky mx-col-official">
                                <span th:if="${row.officialScoreA != null and row.officialScoreB != null}"
                                      th:text="${row.officialScore}">
                                    2-1
                                </span>

                                <span th:if="${row.officialScoreA == null or row.officialScoreB == null}"
                                      class="kickoff-countdown"
                                      th:attr="data-kickoff=${row.kickoffAt == null ? '' : #temporals.format(row.kickoffAt, 'yyyy-MM-dd''T''HH:mm:ss')}">
                                    -
                                </span>
                            </td>

                            <td th:each="entry : ${row.playerPredictions}"
                                class="mx-player-cell"
                                th:classappend="${entry.value.cssClass}"
                                th:attr="data-player=${entry.key},
                                         data-prediction=${entry.value.value},
                                         data-points=${entry.value.points == null ? '' : entry.value.points},
                                         data-css=${entry.value.cssClass}">
                                <span th:text="${entry.value.value}">2-1</span>
                                <span class="mx-points"
                                      th:if="${entry.value.points != null}"
                                      th:text="${entry.value.points}">
                                    3
                                </span>
                            </td>

                        </tr>
                        </tbody>
                    </table>
                </div>

            </section>

        </div>

    </div>

</div>

</body>
</html>
