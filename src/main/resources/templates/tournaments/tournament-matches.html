<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <table class="data-table matches-table" th:if="${matches != null and !matches.isEmpty()}">
        <thead>
        <tr>
            <th>No</th>
            <th>Kickoff</th>
            <th>Team A</th>
            <th>Team B</th>
            <th>Official</th>
            <th>Manual</th>
            <th>Actions</th>
            <th>Stage</th>
            <th>Group</th>
            <th>City</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="m : ${matches}">
            <td th:text="${m.matchNo}">1</td>

            <td th:text="${#temporals.format(m.kickoffAt, 'dd.MM.yyyy HH:mm')}">
                11.06.2026 22:00
            </td>

            <td th:text="${m.teamA}">Team A</td>
            <td th:text="${m.teamB}">Team B</td>

            <td class="score-cell">
                <span th:if="${m.scoreA != null and m.scoreB != null}"
                      th:text="${m.scoreA + ' - ' + m.scoreB}">
                    0 - 0
                </span>
                <span th:if="${m.scoreA == null or m.scoreB == null}">-</span>
            </td>

            <td>
                <form th:action="@{/tournaments/{tid}/matches/{mid}/manual-score(tid=${selectedTournamentId}, mid=${m.id})}"
                      method="post"
                      class="score-form">

                    <input type="number"
                           name="manualScoreA"
                           min="0"
                           class="score-input"
                           th:value="${m.manualScoreA}">

                    <span class="score-separator">-</span>

                    <input type="number"
                           name="manualScoreB"
                           min="0"
                           class="score-input"
                           th:value="${m.manualScoreB}">

                    <button type="submit" class="score-btn">
                        Save
                    </button>

                </form>
            </td>

            <td>
                <form th:action="@{/tournaments/{tid}/matches/{mid}/validate-manual(tid=${selectedTournamentId}, mid=${m.id})}"
                      method="post"
                      class="inline-action-form">

                    <button type="submit"
                            class="score-btn validate"
                            th:disabled="${m.manualScoreA == null or m.manualScoreB == null}">
                        Validate
                    </button>

                </form>
            </td>

            <td th:text="${m.stage}">Group Stage</td>
            <td th:text="${m.groupName}">A</td>
            <td th:text="${m.venueCity}">City</td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
