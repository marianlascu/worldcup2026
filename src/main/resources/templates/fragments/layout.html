<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="appLayout(pageTitle, activeTab, content)">

    <div class="app-layout"
         th:style="${pageBgImage != null} ?
                   'background-image: linear-gradient(rgba(0,0,0,0.68), rgba(0,0,0,0.72)), url(/img/' + ${pageBgImage} + ')'
                   : null">

        <input type="checkbox" id="mobileMenuToggle" class="mobile-menu-toggle">

        <label for="mobileMenuToggle" class="mobile-menu-backdrop"></label>

        <aside class="side-menu">

            <div class="mobile-side-head">
                <div class="side-title">Sport Predictor</div>
                <label for="mobileMenuToggle" class="mobile-menu-x">×</label>
            </div>

            <a th:class="${activeTab == 'main'} ? 'side-tab active' : 'side-tab'" href="/main">Home</a>
            <a th:class="${activeTab == 'tournaments'} ? 'side-tab active' : 'side-tab'" href="/tournaments">Tournaments</a>
            <a th:class="${activeTab == 'leagues'} ? 'side-tab active' : 'side-tab'" href="/leagues">Leagues</a>
            <a th:class="${activeTab == 'players'} ? 'side-tab active' : 'side-tab'" href="/players">Players</a>

            <div class="side-live-panel"
                 th:if="${livePanel != null and !livePanel.empty}">

                <div class="side-live-title">CURRENT GAMES</div>

                <div class="side-live-section"
                     th:if="${livePanel.pastMatches != null and !livePanel.pastMatches.isEmpty()}">

                    <div class="side-live-label">Last games</div>

                    <div class="side-live-line" th:each="m : ${livePanel.pastMatches}">
                        <span class="side-live-no" th:text="${m.matchNo}">1</span>
                        <span class="side-live-teams">
                            <span th:text="${m.teamA}">A</span>
                            <span>-</span>
                            <span th:text="${m.teamB}">B</span>
                        </span>
                        <span class="side-live-score" th:text="${m.scoreText}">2-1</span>
                    </div>
                </div>

                <div class="side-live-focus"
                     th:if="${livePanel.focusMatch != null}"
                     th:classappend="${livePanel.focusMatch.live} ? ' is-live' : ''">

                    <div class="side-live-label side-live-focus-label"
                         th:classappend="${livePanel.focusMatch.live} ? ' is-live' : ''"
                         th:text="${livePanel.focusMatch.live} ? 'LIVE NOW' : 'NEXT MATCH'">
                        NEXT MATCH
                    </div>

                    <div class="side-live-focus-no"
                         th:text="'Match ' + ${livePanel.focusMatch.matchNo}">
                        Match 1
                    </div>

                    <div class="side-live-focus-teams">
                        <span th:text="${livePanel.focusMatch.teamA}">Team A</span>
                        <span> - </span>
                        <span th:text="${livePanel.focusMatch.teamB}">Team B</span>
                    </div>

                    <div class="side-live-focus-score"
                         th:if="${livePanel.focusMatch.live}"
                         th:text="${livePanel.focusMatch.scoreText}">
                        1-0
                    </div>

                    <div class="side-live-focus-time"
                         th:if="${!livePanel.focusMatch.live and livePanel.focusMatch.kickoffAt != null}">

                        <div th:text="${#temporals.format(livePanel.focusMatch.kickoffAt, 'dd.MM HH:mm')}">
                            11.06 22:00
                        </div>

                        <div class="side-live-focus-countdown kickoff-countdown"
                             th:attr="data-kickoff=${#temporals.format(livePanel.focusMatch.kickoffAt, 'yyyy-MM-dd''T''HH:mm:ss')}">
                            -
                        </div>

                    </div>
                </div>

                <div class="side-live-section"
                     th:if="${livePanel.nextMatches != null and !livePanel.nextMatches.isEmpty()}">

                    <div class="side-live-label">Next games</div>

                    <div class="side-live-line" th:each="m : ${livePanel.nextMatches}">
                        <span class="side-live-no" th:text="${m.matchNo}">2</span>
                        <span class="side-live-teams">
                            <span th:text="${m.teamA}">A</span>
                            <span>-</span>
                            <span th:text="${m.teamB}">B</span>
                        </span>
                        <span class="side-live-time"
                              th:text="${m.kickoffAt == null ? '-' : #temporals.format(m.kickoffAt, 'dd.MM HH:mm')}">
                            12.06
                        </span>
                    </div>
                </div>

            </div>

            <div class="side-spacer"></div>

            <a class="side-tab logout" href="/logout">Logout</a>

        </aside>

        <main class="main-content">

            <div class="topbar">

                <label for="mobileMenuToggle" class="mobile-menu-button">☰</label>

                <div class="topbar-title">
                    <h1 th:text="${pageTitle}">Page title</h1>
                    <div class="subtitle">Sports prediction platform</div>
                </div>

                <div class="user-pill">
                    <span th:text="${fullName}">User</span>
                    <span class="role" th:text="${role}">ROLE</span>
                </div>

            </div>

            <div class="main-body" th:insert="${content}"></div>

        </main>

    </div>

    <script src="/js/page-autorefresh.js"></script>
    <script src="/js/kickoff-countdown.js"></script>

</div>

</body>
</html>
