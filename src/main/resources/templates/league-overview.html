<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <div class="league-overview">

        <div class="quick-grid">

            <div class="quick-card">
                <strong th:text="${league.name}">League name</strong>
                <span>League</span>
            </div>

            <div class="quick-card">
                <strong th:text="${league.code}">L-12345678</strong>
                <span>Invite code</span>
            </div>

        </div>

        <section th:if="${canEditLeague}" class="league-edit-box">

            <div class="league-edit-header">
                <h3>League settings</h3>
                <span>Edit league name and invitation code</span>
            </div>

            <div class="league-edit-grid">

                <form method="post"
                      th:action="@{/leagues/{id}/rename(id=${league.id})}"
                      class="league-edit-card">

                    <label for="leagueName">League name</label>

                    <div class="league-edit-row">
                        <input id="leagueName"
                               type="text"
                               name="name"
                               required
                               th:value="${league.name}">

                        <button type="submit" class="small-btn">
                            Save
                        </button>
                    </div>

                </form>

                <div class="league-edit-card">

                    <label for="leagueCode">Invitation code</label>

                    <div class="league-edit-row">
                        <input id="leagueCode"
                               type="text"
                               readonly
                               th:value="${league.code}">

                        <button type="button"
                                class="small-btn"
                                onclick="navigator.clipboard.writeText(document.getElementById('leagueCode').value)">
                            Copy
                        </button>
                    </div>

                </div>

            </div>

        </section>

    </div>

</div>

</body>
</html>
