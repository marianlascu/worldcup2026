<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <section class="card league-inline-card">

        <div class="predictions-header-row">
            <h3>Predictions</h3>

            <form class="winner-form"
                  method="post"
                  th:action="@{/leagues/{id}/winner/save(id=${league.id})}">

                <label for="winnerTeam">Winner</label>

                <select id="winnerTeam"
                        name="teamName"
                        th:disabled="${winnerLocked}">
                    <option value="">-- select --</option>

                    <option th:each="team : ${winnerTeams}"
                            th:value="${team}"
                            th:text="${team}"
                            th:selected="${team == winnerTeamName}">
                        Brazil
                    </option>
                </select>

                <button type="submit"
                        class="winner-save-btn"
                        th:disabled="${winnerLocked}">
                    Save
                </button>

                <span class="winner-current"
                      th:if="${!winnerLocked and winnerTeamName != null and winnerTeamName != ''}">
                    Current:
                    <strong th:text="${winnerTeamName}">Brazil</strong>
                </span>

                <span class="winner-locked"
                      th:if="${winnerLocked}">
                    Locked
                </span>

            </form>
        </div>

        <form method="post"
              th:action="@{/leagues/{id}/predictions/save(id=${league.id})}">

            <table class="simple-table predictions-table">
                <thead>
                <tr>
                    <th>No</th>
                    <th>Stage</th>
                    <th>Date</th>
                    <th>Match</th>
                    <th>Official</th>
                    <th>Your prediction</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="m : ${predictionRows}">
                    <td th:text="${m.matchNo}">1</td>

                    <td>
                        <span th:text="${m.groupName != null and m.groupName != '' ? m.groupName : m.stage}">
                            Group A
                        </span>
                    </td>

                    <td>
                        <span th:if="${m.kickoffAt != null}"
                              th:text="${#temporals.format(m.kickoffAt, 'dd.MM HH:mm')}">
                            11.06 22:00
                        </span>
                    </td>

                    <td>
                        <strong th:text="${m.teamA}">Team A</strong>
                        <span> - </span>
                        <strong th:text="${m.teamB}">Team B</strong>
                    </td>

                    <td>
                        <span th:if="${m.officialScoreA != null and m.officialScoreB != null}"
                              th:text="${m.officialScoreA + ' - ' + m.officialScoreB}">
                            2 - 1
                        </span>

                        <span th:if="${m.officialScoreA == null or m.officialScoreB == null}"
                              class="kickoff-countdown"
                              th:attr="data-kickoff=${m.kickoffAt == null ? '' : #temporals.format(m.kickoffAt, 'yyyy-MM-dd''T''HH:mm:ss')}">
                            -
                        </span>
                    </td>

                    <td>
                        <input type="hidden"
                               name="matchId"
                               th:value="${m.matchId}">

                        <input type="number"
                               min="0"
                               max="30"
                               class="score-input"
                               th:name="${'scoreA_' + m.matchId}"
                               th:value="${m.predictedScoreA}"
                               th:disabled="${m.locked}">

                        <span> - </span>

                        <input type="number"
                               min="0"
                               max="30"
                               class="score-input"
                               th:name="${'scoreB_' + m.matchId}"
                               th:value="${m.predictedScoreB}"
                               th:disabled="${m.locked}">

                        <span th:if="${m.locked}"
                              class="prediction-locked-badge">
                            LOCKED
                        </span>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(predictionRows)}">
                    <td colspan="6">No matches available for this league tournament.</td>
                </tr>
                </tbody>
            </table>

            <div class="predictions-save-row">
                <button type="submit" class="save-predictions-btn">
                    Save predictions
                </button>
            </div>

        </form>

    </section>

</div>

</body>
</html>
